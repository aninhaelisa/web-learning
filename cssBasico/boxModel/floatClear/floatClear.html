<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float e Clear</title>
    <link rel="stylesheet" href="floatClear.css">
</head>

<style>

.container{
    width: 80%;
    background-color: #ccc;
    padding: 15px;
    overflow: auto;
}

.container div{
    background-color: rgba(250, 0, 0, 0.3);
    margin: 15px;
    width: 20%;
    height: 50px;
}

#div-1{
    float: left;
}

#div-2{
    float: left;
}

#div-3{
    float: left; 
}


</style>

<body>

    <div class="container">
        <div id="div-1">div1</div>
        <div id="div-2">div2</div>
        <div id="div-3">div3</div>
    </div>

</body>

</html>
