<!doctype html>
<html lang="pt-br">

<head>
    <title>Estrutura base</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- meta viewport serve para indicar que o site é responsivo -->
    <meta name="description" content="Descrição do site"> <!-- meta description serve para indicar a descrição do site -->
    <meta name="keywords" content="palavras, chave, do, site"> <!-- meta keywords serve para indicar as palavras chave do site -->
    <meta name="author" content="Nome do autor"> <!-- meta author serve para indicar o autor do site -->
    <meta name="robots" content="index, follow"> <!-- meta robots serve para indicar se o site deve ser indexado pelos motores de busca -->
    <meta name="theme-color" content="#000000"> <!-- meta theme-color serve para indicar a cor do tema do site -->
    <!--existem diversos tipos de meta tags, cada uma com sua função específica. Algumas das mais comuns incluem: charset, viewport, description, keywords, author, robots, theme-color, og:title, og:description, og:image, og:url, twitter:card, twitter:title, twitter:description, twitter:image, twitter:url. -->
</head>

<body>
    <!-- tudo visivel pelo usuario -->
    <h1>Titulo</h1>
    <p>Atenção: meta charser serve para indicar qual a codificação de caracteres.</p>
</body>

</html>
